name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialise public build submodules
        run: |
          git submodule sync
          git submodule update --init kittyx src/asm baguette thistlecc

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Clean
        run: npm run clean

      - name: Compile TypeScript
        run: npx tsc -p tsconfig.json

      - name: Build static web assets
        run: node build/tool/post.js

      - name: Build Teto
        run: npm run teto:build

      - name: Run NERU selector tests
        run: node --test build/backends/neru/cli.test.js

      - name: Run mikuOS tests
        run: node build/test/all.js
