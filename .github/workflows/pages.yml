name: Build and deploy mikuOS to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static mikuOS
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: npm ci

      - name: Build mikuOS
        run: npm run build

      - name: Verify static Pages output
        shell: bash
        run: |
          set -Eeuo pipefail

          test -s dist/web/index.html
          test -s dist/web/thistle.js
          test -s dist/web/teto/teto.wasm
          test -s dist/web/teto/teto-threads.wasm
          test -s dist/web/root/manifest.json

          touch dist/web/.nojekyll

          echo "Static mikuOS build verified:"
          find dist/web -maxdepth 2 -type f -printf '%p\n' | sort

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/web

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy mikuOS
        id: deployment
        uses: actions/deploy-pages@v4
