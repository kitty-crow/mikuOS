$schema: https://json-schema.org/draft/2020-12/schema
title: Thistle manifest
type: object
required: [name, release, kind, language, targets]
properties:
  name: {type: string}
  release: {type: string}
  kind: {const: user-space-unix-kernel}
  language: {const: TypeScript}
  targets:
    type: array
    items: {enum: [browser, bun]}
  kernel: {type: object}
  userland: {type: object}
  licence: {type: string}
